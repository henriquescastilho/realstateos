# Local development only. Do not use this file as a Railway deploy manifest.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-realestateos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET_NAME:-realestateos};
      echo 'bucket ready';
      "

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/realestateos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PORT: ${API_PORT:-8000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-only-unsafe-secret-replace-in-production}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-2}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SANTANDER_SANDBOX_ENABLED: ${SANTANDER_SANDBOX_ENABLED:-true}
      SANTANDER_CLIENT_ID: ${SANTANDER_CLIENT_ID:-sandbox-client-id}
      SANTANDER_CLIENT_SECRET: ${SANTANDER_CLIENT_SECRET:-sandbox-client-secret}
      PAYMENT_MOCK_FALLBACK_ENABLED: ${PAYMENT_MOCK_FALLBACK_ENABLED:-true}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-realestateos}
    volumes:
      - ./apps/api:/app
    command: sh scripts/start-api.sh
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - db
      - redis
      - minio

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/realestateos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PORT: ${WORKER_PORT:-8081}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-only-unsafe-secret-replace-in-production}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-2}
      SANTANDER_SANDBOX_ENABLED: ${SANTANDER_SANDBOX_ENABLED:-true}
      SANTANDER_CLIENT_ID: ${SANTANDER_CLIENT_ID:-sandbox-client-id}
      SANTANDER_CLIENT_SECRET: ${SANTANDER_CLIENT_SECRET:-sandbox-client-secret}
      PAYMENT_MOCK_FALLBACK_ENABLED: ${PAYMENT_MOCK_FALLBACK_ENABLED:-true}
    volumes:
      - ./apps/api:/app
    ports:
      - "${WORKER_PORT:-8081}:8081"
    depends_on:
      - db
      - redis

  api-node:
    build:
      context: ./apps/api-node
    environment:
      DATABASE_URL: ${DATABASE_URL_NODE:-postgresql://postgres:postgres@db:5432/realestateos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PORT: ${API_NODE_PORT:-8082}
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-only-unsafe-secret-replace-in-production}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-realestateos}
    ports:
      - "${API_NODE_PORT:-8082}:8082"
    depends_on:
      - db
      - redis
      - minio
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    profiles:
      - node  # opt-in: run with `docker compose --profile node up`
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

  # ── Nginx API Gateway ──────────────────────────────────────────────────────
  # Provides: rate limiting (per token + per IP), SSL termination, gzip,
  # upstream health checks, and structured JSON access logging.
  #
  # Dev setup:
  #   1. Run `bash nginx/gen-dev-certs.sh` to generate self-signed TLS certs.
  #   2. Set NGINX_ENABLED=true to include this service.
  #
  # Production:
  #   Point ssl_certificate/ssl_certificate_key in nginx/api-gateway.conf at
  #   your real certificate files (Let's Encrypt or your CA).
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    profiles:
      - gateway  # opt-in: run with `docker compose --profile gateway up`
    volumes:
      - ./nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Monitoring stack (Prometheus + Grafana + AlertManager) ───────────────────
  # Opt-in: docker compose --profile monitoring up
  # Access:
  #   Prometheus   → http://localhost:9090
  #   Grafana      → http://localhost:3001  (admin / admin)
  #   AlertManager → http://localhost:9093
  # ─────────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles:
      - monitoring
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.0
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_PATHS_PROVISIONING:      /etc/grafana/provisioning
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/api-overview.json
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      # Alerting contacts (set in env or .env file)
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles:
      - monitoring
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://localhost:9093
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Redis exporter — publishes Redis metrics to Prometheus
  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    profiles:
      - monitoring
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    depends_on:
      - redis
    restart: unless-stopped

  # PostgreSQL exporter — publishes PG metrics to Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    profiles:
      - monitoring
    environment:
      DATA_SOURCE_NAME: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/realestateos?sslmode=disable}
    ports:
      - "${PG_EXPORTER_PORT:-9187}:9187"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
  nginx_logs:
  prometheus_data:
  grafana_data:
  alertmanager_data:
