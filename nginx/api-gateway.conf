# Real Estate OS — Nginx API Gateway
# ─────────────────────────────────────────────────────────────────────────────
# Features:
#   • Rate limiting per Authorization token (proxy for org_id) + per IP fallback
#   • Request / response access logging with upstream timing
#   • SSL termination (TLS 1.2/1.3) — point ssl_certificate at real certs
#   • Upstream health checks with retry on failure
#   • Gzip compression for JSON and text responses
#   • Security headers forwarded to upstream
# ─────────────────────────────────────────────────────────────────────────────

# ---------------------------------------------------------------------------
# Rate-limit zones
# ---------------------------------------------------------------------------
# Primary zone: keyed on the Authorization header value.
# Using the Bearer token as a key approximates per-org rate limiting without
# JWT parsing in nginx.  Replace with $http_x_org_id if the API gateway
# performs token extraction and forwards that header.
#
# Fallback zone: keyed on client IP (for unauthenticated / health-check traffic).
# ---------------------------------------------------------------------------

# 10 MB zone → can track ~160 000 unique token hashes
limit_req_zone $http_authorization  zone=per_token:10m  rate=100r/m;
# Auth endpoints: stricter — 10 req/min per IP
limit_req_zone $binary_remote_addr  zone=per_ip_auth:1m  rate=10r/m;
# Agent endpoints: 20 req/min per token
limit_req_zone $http_authorization  zone=per_token_agents:5m  rate=20r/m;
# Global per-IP fallback (for paths without Authorization)
limit_req_zone $binary_remote_addr  zone=per_ip:10m  rate=100r/m;

# Return 429 (not 503) on rate-limit violation
limit_req_status 429;

# ---------------------------------------------------------------------------
# Upstream backends
# ---------------------------------------------------------------------------

upstream api_backend {
    # FastAPI backend — add more servers for horizontal scaling
    server api:8000 fail_timeout=5s max_fails=3;

    # Example multi-server setup (uncomment for production):
    # server api-2:8000 fail_timeout=5s max_fails=3;
    # server api-3:8000 fail_timeout=5s max_fails=3;

    keepalive 32;
}

upstream web_backend {
    server web:3000 fail_timeout=5s max_fails=3;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# Log format — structured with upstream timing and request ID
# ---------------------------------------------------------------------------

log_format main_json escape=json
    '{'
    '"time":"$time_iso8601",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_time":"$upstream_response_time",'
    '"upstream_status":"$upstream_status",'
    '"remote_addr":"$remote_addr",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"x_request_id":"$http_x_request_id",'
    '"user_agent":"$http_user_agent",'
    '"referer":"$http_referer"'
    '}';

# ---------------------------------------------------------------------------
# Gzip compression
# ---------------------------------------------------------------------------

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    application/json
    application/javascript
    text/javascript
    text/css
    text/plain
    text/xml
    application/xml
    application/vnd.ms-excel
    application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect  (port 80)
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server  (port 443)
# ─────────────────────────────────────────────────────────────────────────────
# In development, either:
#   a) Use a self-signed cert (see scripts/gen-dev-certs.sh), OR
#   b) Comment out the ssl_* lines and listen on 443 without TLS
# In production, point ssl_certificate at your real certificate files.
# ---------------------------------------------------------------------------

server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS configuration ────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log main_json;
    error_log  /var/log/nginx/error.log warn;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size 55M;          # slightly above the 50 MB upload limit
    client_body_timeout 60s;
    client_header_timeout 15s;
    send_timeout 60s;

    # ── Proxy defaults ────────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";   # for WebSocket support
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $http_x_request_id;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    # ── Health / readiness probes (no rate limit, no auth) ───────────────────
    location = /health {
        proxy_pass http://api_backend/health;
        proxy_set_header Authorization "";
        access_log off;
    }

    location = /health/live {
        proxy_pass http://api_backend/health/live;
        access_log off;
    }

    location = /health/ready {
        proxy_pass http://api_backend/health/ready;
        access_log off;
    }

    # ── Metrics endpoint (restrict to internal / monitoring networks) ─────────
    location = /metrics {
        # Restrict to internal subnet — uncomment and adjust CIDR in production:
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://api_backend/metrics;
        access_log off;
    }

    # ── Auth endpoints — strict rate limit (10 req/min per IP) ───────────────
    location ~ ^/(v1/)?auth/ {
        limit_req zone=per_ip_auth burst=5 nodelay;
        proxy_pass http://api_backend;
    }

    # ── Agent / bulk endpoints — 20 req/min per token ────────────────────────
    location ~ ^/(v1/)?(agents?|bulk)/ {
        limit_req zone=per_token_agents burst=10 nodelay;
        proxy_pass http://api_backend;
    }

    # ── Upload endpoint — no rate limit (handled by file size), extended timeout
    location ~ ^/(v1/)?uploads {
        limit_req zone=per_token burst=20 nodelay;
        client_max_body_size 55M;
        proxy_request_buffering off;   # stream directly to upstream
        proxy_read_timeout 300s;
        proxy_pass http://api_backend;
    }

    # ── API routes — 100 req/min per token ───────────────────────────────────
    location ~ ^/(v1/|api/)? {
        limit_req zone=per_token burst=50 nodelay;
        # Fallback to per-IP when Authorization header is absent
        limit_req zone=per_ip burst=30 nodelay;
        proxy_pass http://api_backend;
    }

    # ── Next.js frontend ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://web_backend;
        proxy_cache_bypass $http_upgrade;
    }

    # ── OpenAPI docs (restrict in production) ────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        # In production, restrict to internal networks:
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://api_backend;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\.git {
        return 404;
    }
    location ~ /\.(env|key|pem|crt) {
        return 404;
    }
}
