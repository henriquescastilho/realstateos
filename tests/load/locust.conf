# Locust configuration for Real Estate OS load tests
# https://docs.locust.io/en/stable/configuration.html
#
# Run:
#   locust --config tests/load/locust.conf              # full 3-profile run
#   locust --config tests/load/locust.conf BrowseUser   # browse scenario only
#   locust --config tests/load/locust.conf WebhookUser  # webhook throughput only
#
# Override any option via CLI flag:
#   locust --config tests/load/locust.conf -u 200 -r 20 -t 10m

# Target host (override with -H / --host or HOST env var)
host = http://localhost:8000

# Headless mode — remove this line to use the web UI
headless = true

# ─── User counts per scenario ────────────────────────────────────────────────
# Combined run (all 3 profiles, weight-adjusted):
#   BrowseUser  × 4 weight → ~86 users  of 150
#   BillingUser × 2 weight → ~43 users  of 150
#   WebhookUser × 1 weight → ~21 users  of 150  (enough for 200 req/s @ 0.1s wait)
users = 150
spawn-rate = 10

# Test duration
run-time = 6m

# ─── Output ──────────────────────────────────────────────────────────────────
# CSV stats written to tests/load/results/ — consumed by slo_check.py
csv = tests/load/results/stats
html = tests/load/results/report.html

# Print stats every 15 seconds during the run
print-stats = 15

# ─── Failure threshold ───────────────────────────────────────────────────────
# Locust exits 1 if more than 1% of requests fail.
# The on_test_stop hook also checks p95 and sets exit code.
stop-at-end = true
