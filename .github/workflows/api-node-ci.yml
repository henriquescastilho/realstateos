name: API Node CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/api-node/**'
      - '.github/workflows/api-node-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api-node/**'
      - '.github/workflows/api-node-ci.yml'

defaults:
  run:
    working-directory: apps/api-node

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: apps/api-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build
