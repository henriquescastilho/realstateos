name: CD — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Force deploy even if CI is not green
        type: boolean
        default: false

concurrency:
  group: cd-staging
  cancel-in-progress: true

env:
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: realstateos-staging
  GKE_ZONE: us-central1
  HELM_RELEASE: realstateos-staging
  NAMESPACE: realstateos-staging

jobs:
  # ─── Build and push images ──────────────────────────────────────────────────
  build-images:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.force_deploy == 'true'

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push — api
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            gcr.io/${{ env.PROJECT_ID }}/api:${{ steps.meta.outputs.tag }}
            gcr.io/${{ env.PROJECT_ID }}/api:staging-latest
          cache-from: type=registry,ref=gcr.io/${{ env.PROJECT_ID }}/api:staging-latest
          cache-to: type=inline

      - name: Build and push — api-node
        uses: docker/build-push-action@v5
        with:
          context: apps/api-node
          push: true
          tags: |
            gcr.io/${{ env.PROJECT_ID }}/api-node:${{ steps.meta.outputs.tag }}
            gcr.io/${{ env.PROJECT_ID }}/api-node:staging-latest
          cache-from: type=registry,ref=gcr.io/${{ env.PROJECT_ID }}/api-node:staging-latest
          cache-to: type=inline

      - name: Build and push — worker
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          file: apps/api/Dockerfile.worker
          push: true
          tags: |
            gcr.io/${{ env.PROJECT_ID }}/worker:${{ steps.meta.outputs.tag }}
            gcr.io/${{ env.PROJECT_ID }}/worker:staging-latest

      - name: Build and push — web
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: |
            gcr.io/${{ env.PROJECT_ID }}/web:${{ steps.meta.outputs.tag }}
            gcr.io/${{ env.PROJECT_ID }}/web:staging-latest
          cache-from: type=registry,ref=gcr.io/${{ env.PROJECT_ID }}/web:staging-latest
          cache-to: type=inline
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.staging.realstateos.com/api
            NEXT_TELEMETRY_DISABLED=1

  # ─── Run migrations ─────────────────────────────────────────────────────────
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: build-images
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Run Alembic migrations
        run: |
          kubectl run migration-${{ github.run_number }} \
            --image=gcr.io/${{ env.PROJECT_ID }}/api:${{ needs.build-images.outputs.image_tag }} \
            --restart=Never \
            --namespace=${{ env.NAMESPACE }} \
            --env="DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}" \
            --command -- python -m alembic upgrade head
          kubectl wait --for=condition=ready pod/migration-${{ github.run_number }} \
            --timeout=120s --namespace=${{ env.NAMESPACE }} || true
          kubectl logs migration-${{ github.run_number }} --namespace=${{ env.NAMESPACE }}
          kubectl delete pod migration-${{ github.run_number }} --namespace=${{ env.NAMESPACE }}

  # ─── Deploy via Helm ────────────────────────────────────────────────────────
  deploy:
    name: Helm deploy to staging
    runs-on: ubuntu-latest
    needs: [build-images, migrate]
    environment:
      name: staging
      url: https://staging.realstateos.com

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Helm upgrade (staging)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/realstateos/ \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            -f helm/realstateos/values.yaml \
            -f helm/realstateos/values.staging.yaml \
            --set global.imageRegistry=gcr.io/${{ env.PROJECT_ID }} \
            --set api.image.tag=${{ needs.build-images.outputs.image_tag }} \
            --set apiNode.image.tag=${{ needs.build-images.outputs.image_tag }} \
            --set worker.image.tag=${{ needs.build-images.outputs.image_tag }} \
            --set web.image.tag=${{ needs.build-images.outputs.image_tag }} \
            --set secrets.existingSecret=realstateos-staging-secret \
            --atomic \
            --timeout 10m \
            --wait

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/realstateos-staging-api \
            --namespace ${{ env.NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/realstateos-staging-web \
            --namespace ${{ env.NAMESPACE }} --timeout=5m

      - name: Smoke test staging
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api.staging.realstateos.com/health || echo "000")
          echo "Health check status: $STATUS"
          [[ "$STATUS" == "200" ]] || (echo "Smoke test failed!" && exit 1)

      - name: Notify on success
        if: success()
        run: |
          echo "::notice::Staging deployment succeeded — ${{ needs.build-images.outputs.image_tag }}"

      - name: Rollback on failure
        if: failure()
        run: |
          helm rollback ${{ env.HELM_RELEASE }} --namespace ${{ env.NAMESPACE }}
          echo "::error::Staging deployment failed — rolled back to previous release"
