apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: realstateos
  labels:
    app: api
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: realstateos
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
