apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: realstateos-ingress
  namespace: realstateos
  labels:
    app.kubernetes.io/part-of: realstateos
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Rate limiting for auth paths
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "20"
spec:
  tls:
    - hosts:
        - api.realstateos.com
        - app.realstateos.com
        - api-node.realstateos.com
      secretName: realstateos-tls
  rules:
    - host: api.realstateos.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
    - host: app.realstateos.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: api-node.realstateos.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-node
                port:
                  number: 8082
