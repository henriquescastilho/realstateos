# Secret template for Real Estate OS platform.
# Replace placeholder values before applying.
# To encode a value: echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: realstateos-secret
  namespace: realstateos
  labels:
    app.kubernetes.io/part-of: realstateos
type: Opaque
data:
  # Replace with: echo -n 'postgresql://user:pass@host:5432/dbname' | base64
  DATABASE_URL: <base64-encoded-value>
  # Replace with: echo -n 'redis://user:pass@host:6379' | base64
  REDIS_URL: <base64-encoded-value>
  # Replace with: echo -n 'your-jwt-secret-min-32-chars' | base64
  JWT_SECRET: <base64-encoded-value>
  # Replace with: echo -n 'your-s3-access-key-id' | base64
  S3_ACCESS_KEY_ID: <base64-encoded-value>
  # Replace with: echo -n 'your-s3-secret-access-key' | base64
  S3_SECRET_ACCESS_KEY: <base64-encoded-value>
  # Replace with: echo -n 'your-santander-client-id' | base64
  SANTANDER_CLIENT_ID: <base64-encoded-value>
  # Replace with: echo -n 'your-santander-client-secret' | base64
  SANTANDER_CLIENT_SECRET: <base64-encoded-value>
