apiVersion: v1
kind: ConfigMap
metadata:
  name: realstateos-config
  namespace: realstateos
  labels:
    app.kubernetes.io/part-of: realstateos
data:
  PORT: "8000"
  NODE_ENV: "production"
  ENVIRONMENT: "production"
  CORS_ALLOWED_ORIGINS: "https://app.realstateos.com,https://api.realstateos.com"
  WORKER_POLL_INTERVAL_SECONDS: "30"
  S3_BUCKET_NAME: "realstateos-prod"
  S3_ENDPOINT_URL: "https://storage.googleapis.com"
  SANTANDER_SANDBOX_ENABLED: "false"
