{{- if .Values.apiNode.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-api-node" (include "realstateos.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "realstateos.labels" . | nindent 4 }}
    app.kubernetes.io/name: api-node
    app: api-node
spec:
  type: ClusterIP
  selector:
    app: api-node
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.apiNode.servicePort }}
      targetPort: http
      protocol: TCP
{{- end }}
