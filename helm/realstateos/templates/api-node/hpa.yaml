{{- if and .Values.apiNode.enabled .Values.apiNode.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ printf "%s-api-node" (include "realstateos.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "realstateos.labels" . | nindent 4 }}
    app.kubernetes.io/name: api-node
    app: api-node
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ printf "%s-api-node" (include "realstateos.fullname" .) }}
  minReplicas: {{ .Values.apiNode.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.apiNode.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiNode.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiNode.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
