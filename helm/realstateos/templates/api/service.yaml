{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-api" (include "realstateos.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "realstateos.labels" . | nindent 4 }}
    app.kubernetes.io/name: api
    app: api
spec:
  type: ClusterIP
  selector:
    app: api
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.api.servicePort }}
      targetPort: http
      protocol: TCP
{{- end }}
