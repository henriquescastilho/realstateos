{{/*
Only render this Secret when secrets.existingSecret is NOT set.
When existingSecret is provided, callers reference that pre-existing secret
directly and this resource is suppressed to avoid conflicts.
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-secret" (include "realstateos.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "realstateos.labels" . | nindent 4 }}
  annotations:
    # Helm will not diff secret values in plain text.
    helm.sh/resource-policy: keep
type: Opaque
data:
  DATABASE_URL: {{ required "secrets.databaseUrl is required when not using secrets.existingSecret" .Values.secrets.databaseUrl | b64enc | quote }}
  REDIS_URL: {{ required "secrets.redisUrl is required when not using secrets.existingSecret" .Values.secrets.redisUrl | b64enc | quote }}
  JWT_SECRET: {{ required "secrets.jwtSecret is required when not using secrets.existingSecret" .Values.secrets.jwtSecret | b64enc | quote }}
  S3_ACCESS_KEY_ID: {{ .Values.secrets.s3AccessKeyId | b64enc | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.secrets.s3SecretAccessKey | b64enc | quote }}
  SANTANDER_CLIENT_ID: {{ .Values.secrets.santanderClientId | b64enc | quote }}
  SANTANDER_CLIENT_SECRET: {{ .Values.secrets.santanderClientSecret | b64enc | quote }}
{{- end }}
