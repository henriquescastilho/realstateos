{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-worker" (include "realstateos.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "realstateos.labels" . | nindent 4 }}
    app.kubernetes.io/name: worker
    app: worker
spec:
  # Worker does not have HPA — scale manually via replicaCount in values.
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "realstateos.labels" . | nindent 8 }}
        app.kubernetes.io/name: worker
        app: worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "realstateos.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: {{ .Values.worker.topologySpreadUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: worker
              app.kubernetes.io/instance: {{ .Release.Name }}
      containers:
        - name: worker
          image: {{ include "realstateos.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.worker.image.repository "tag" .Values.worker.image.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.worker.servicePort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "realstateos.configMapName" . }}
            - secretRef:
                name: {{ include "realstateos.secretName" . }}
          env:
            - name: PORT
              value: {{ .Values.worker.servicePort | quote }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.worker.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.worker.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.worker.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.worker.readinessProbe.successThreshold }}
            timeoutSeconds: {{ .Values.worker.readinessProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.worker.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.worker.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.worker.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.worker.livenessProbe.successThreshold }}
            timeoutSeconds: {{ .Values.worker.livenessProbe.timeoutSeconds }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
