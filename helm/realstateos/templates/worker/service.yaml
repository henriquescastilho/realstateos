{{- if .Values.worker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-worker" (include "realstateos.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "realstateos.labels" . | nindent 4 }}
    app.kubernetes.io/name: worker
    app: worker
spec:
  # Worker is internal-only — ClusterIP is intentional.
  type: ClusterIP
  selector:
    app: worker
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.worker.servicePort }}
      targetPort: http
      protocol: TCP
{{- end }}
