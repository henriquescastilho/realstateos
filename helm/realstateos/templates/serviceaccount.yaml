{{- if .Values.serviceAccount.create }}
---
# Shared ServiceAccount — all workloads reference this account.
# Per-service accounts could be added here if granular RBAC is needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "realstateos.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "realstateos.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Do not auto-mount the token — services use explicit mounts only.
automountServiceAccountToken: false
---
# Role: read own pod info (for health-check sidecars, leader-election, etc.)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-pod-reader" (include "realstateos.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "realstateos.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-pod-reader" (include "realstateos.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "realstateos.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "realstateos.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ printf "%s-pod-reader" (include "realstateos.fullname" .) }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
