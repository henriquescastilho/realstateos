## Development overrides — local cluster / kind / minikube
## Usage: helm upgrade --install realstateos . -f values.yaml -f values.dev.yaml

global:
  imagePullPolicy: IfNotPresent

config:
  environment: development
  corsAllowedOrigins: "http://localhost:3000"
  santanderSandboxEnabled: "true"
  s3EndpointUrl: "http://minio:9000"
  s3BucketName: "realestateos-dev"

# Spin up all infrastructure in-cluster for dev convenience
postgresql:
  enabled: true
  auth:
    database: realestateos
    username: realestateos
    password: devpassword

redis:
  enabled: true
  auth:
    enabled: true
    password: devpassword

minio:
  enabled: true
  auth:
    rootUser: minio
    rootPassword: devpassword

api:
  replicaCount: 1
  autoscaling:
    enabled: false

apiNode:
  replicaCount: 1
  autoscaling:
    enabled: false

worker:
  replicaCount: 1

web:
  replicaCount: 1
  autoscaling:
    enabled: false

ingress:
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    api: api.localhost
    apiNode: api-node.localhost
    web: app.localhost
  tls:
    enabled: false
