services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: realestateos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ../apps/api
    env_file:
      - ./env/api.env.example
    volumes:
      - ../apps/api:/app
    ports:
      - "8000:8000"
    command: sh scripts/start-api.sh
    depends_on:
      - db
      - redis
      - minio

  worker:
    build:
      context: ../apps/api
    env_file:
      - ./env/api.env.example
    command: sh scripts/start-worker.sh
    volumes:
      - ../apps/api:/app
    depends_on:
      - api
      - redis

  web:
    build:
      context: ../apps/web
    env_file:
      - ./env/web.env.example
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    depends_on:
      - api

volumes:
  postgres_data:
