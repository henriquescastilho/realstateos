# Promtail Configuration — Real Estate OS
# Ships container logs to Loki
#
# Strategy: Docker socket discovery (auto-detects all running containers)
# Labels attached to each log stream:
#   service      → docker-compose service name (api, worker, api-node, web, ...)
#   container    → full container name
#   environment  → value of ENVIRONMENT env var on the container (if set)
#   level        → extracted from JSON log lines (info, warning, error, ...)
#
# Runs as a sidecar in the `logging` docker-compose profile.
# Mount: /var/run/docker.sock (read-only) + /var/lib/docker/containers (read-only)

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  # Tracks which log positions have been read (persisted across restarts)
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Docker socket discovery ────────────────────────────────────────────────
  # Auto-discovers all containers on the Docker host.
  - job_name: docker
    docker_sd_configs:
      - host:             unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Only scrape containers in the realstateos project
          - name:   label
            values: ["com.docker.compose.project=realstateos-enterprise"]

    relabel_configs:

      # Use the docker-compose service name as the `service` label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label:   service

      # Keep the full container name
      - source_labels: [__meta_docker_container_name]
        regex:          '/(.*)'
        target_label:   container

      # Docker log path (used to find the log file)
      - source_labels: [__meta_docker_container_id]
        target_label:   __path__
        replacement:    /var/lib/docker/containers/$1/$1-json.log

      # Add environment label from container env var (if set)
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label:   project

      # Drop monitoring containers from their own logs (noisy, low value)
      - source_labels: [service]
        regex:          "prometheus|grafana|alertmanager|loki|promtail|redis-exporter|postgres-exporter"
        action:         drop

    pipeline_stages:

      # Parse Docker JSON log wrapper: {"log":"...\n","stream":"stdout","time":"..."}
      - json:
          expressions:
            output:    log
            stream:    stream
            timestamp: time

      # Set the log timestamp from Docker metadata
      - timestamp:
          source: timestamp
          format: RFC3339Nano

      # Attempt to parse the inner JSON (structlog output from our services)
      - json:
          source: output
          expressions:
            level:          level
            logger:         logger
            message:        message
            correlation_id: correlation_id
            event:          event

      # Use `level` from parsed JSON as a Loki label for fast filtering
      - labels:
          level:  ""
          logger: ""

      # Set the final log line to the inner message (human-readable in Grafana)
      - output:
          source: output

  # ── Static: catch-all for containers not found via socket discovery ────────
  # (fallback if Docker socket is unavailable in CI environments)
  - job_name: static-api
    static_configs:
      - targets:
          - localhost
        labels:
          service:  api
          __path__: /var/log/realstateos/*.log
    pipeline_stages:
      - json:
          expressions:
            level:   level
            message: message
      - labels:
          level: ""
