global:
  scrape_interval:     15s   # scrape every 15 seconds
  evaluation_interval: 15s   # evaluate alerting rules every 15 seconds
  external_labels:
    environment: 'development'
    project:     'realstateos'

# ── Alerting ──────────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Rule files ────────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI Python backend — exposes custom app metrics at /metrics
  - job_name: 'realstateos-api'
    scrape_interval: 15s
    scrape_timeout:  10s
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'
          lang:    'python'
    metrics_path: /metrics

  # FastAPI background worker
  - job_name: 'realstateos-worker'
    scrape_interval: 30s
    static_configs:
      - targets: ['worker:8081']
        labels:
          service: 'worker'
          lang:    'python'
    metrics_path: /metrics

  # Node.js backend (opt-in profile — skipped if service is down)
  - job_name: 'realstateos-api-node'
    scrape_interval: 15s
    static_configs:
      - targets: ['api-node:8082']
        labels:
          service: 'api-node'
          lang:    'node'
    metrics_path: /metrics

  # Redis — using redis_exporter sidecar
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # PostgreSQL — using postgres_exporter sidecar
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgresql'
