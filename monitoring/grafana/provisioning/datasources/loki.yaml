apiVersion: 1

# Loki datasource — enabled by task 89 (Log Aggregation)
# Stub included here so dashboards that reference Loki don't break if
# the monitoring profile is started before the loki profile.
datasources:
  - name:    Loki
    type:    loki
    uid:     loki
    url:     http://loki:3100
    access:  proxy
    jsonData:
      maxLines: 1000
    editable: false
